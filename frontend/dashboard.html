<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд — WB Аналитика</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Дополнения для авторизованного дашборда */
    nav{background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:0 16px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:50}
    .nav-logo{width:28px;height:28px;border-radius:7px;background:#7C3AED;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
    .nav-title{font-size:14px;font-weight:700;color:var(--t)}
    .nav-links{display:flex;gap:2px;margin-left:8px}
    .nav-link{padding:4px 11px;border-radius:8px;font-size:12px;color:var(--g);text-decoration:none;transition:background .15s}
    .nav-link:hover,.nav-link.active{background:#7C3AED15;color:#7C3AED;font-weight:500}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .nav-username{font-size:12px;color:var(--g)}
    .btn-logout{border:none;background:none;cursor:pointer;font-size:12px;color:#DC2626;font-family:inherit}

    /* Manager selector */
    .mgr-select{border:0.5px solid rgba(0,0,0,.15);border-radius:8px;padding:4px 10px;font-size:12px;font-family:inherit;color:var(--t);background:var(--bg);min-width:140px}

    /* Upload section */
    .upload-section{background:#fff;border-radius:14px;border:0.5px solid rgba(0,0,0,.08);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .upload-section h3{font-size:13px;font-weight:600;margin-bottom:2px}
    .upload-section p{font-size:11px;color:var(--g)}
    .upload-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .btn-upload{display:inline-flex;align-items:center;gap:6px;background:#7C3AED;color:#fff;border:none;padding:8px 16px;border-radius:9px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;position:relative}
    .btn-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .upload-status{font-size:12px;color:var(--g)}
    .upload-status.ok{color:#16A34A}
    .upload-status.err{color:#DC2626}
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-logo">WB</div>
  <div class="nav-title">Воронка продаж</div>
  <div class="nav-links">
    <a class="nav-link active" href="dashboard.html">Дашборд</a>
    <a class="nav-link" href="admin.html" id="admin-link" style="display:none">Управление</a>
  </div>
  <div class="nav-right">
    <!-- Выбор менеджера (только для admin) -->
    <select class="mgr-select" id="mgr-select" style="display:none" onchange="onManagerChange()">
      <option value="">Все менеджеры</option>
    </select>
    <span class="nav-username" id="nav-username">—</span>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
</nav>

<div id="app" style="padding:12px 14px">

  <!-- Upload section -->
  <div class="upload-section" id="upload-section">
    <div>
      <h3>Загрузить отчёт</h3>
      <p>Файл «Воронка продаж» из кабинета WB · Excel</p>
    </div>
    <div class="upload-right">
      <select class="mgr-select" id="upload-mgr-select" style="display:none">
        <option value="">— выберите менеджера —</option>
      </select>
      <button class="btn-upload">
        <input type="file" id="upload-input" accept=".xlsx,.xls" onchange="uploadReport()">
        📂 Загрузить Excel
      </button>
      <span class="upload-status" id="upload-status"></span>
    </div>
  </div>

  <!-- History of loaded reports -->
  <div id="reports-list" style="margin-bottom:14px"></div>

  <!-- Weeks selector (from DB reports) -->
  <div class="wbar" id="wbar" style="display:none">
    <span class="wlabel">Периоды:</span>
    <div id="wrow"></div>
  </div>

  <!-- Tabs & content (same as existing dashboard) -->
  <div id="main-content" style="display:none">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('summary',this)">Сводка</button>
      <button class="tab" onclick="switchTab('charts',this)">Графики</button>
      <button class="tab" onclick="switchTab('goods',this)">По товарам</button>
    </div>

    <div class="tbody" id="tab-summary">
      <div class="slabel">Показатели</div>
      <div class="chips-row" id="chips-s"></div>
      <div id="scards"></div>
    </div>
    <div class="tbody" id="tab-charts" style="display:none">
      <div class="slabel">Метрики для графиков</div>
      <div class="chips-row" id="chips-c"></div>
      <div class="cgrid" id="cgrid"></div>
    </div>
    <div class="tbody" id="tab-goods" style="display:none">
      <div class="slabel">Столбцы</div>
      <div class="chips-row" id="chips-g"></div>
      <div class="goods-layout">
        <div class="filter-panel">
          <div class="fp-header">
            <span class="fp-title">Артикул <span class="fp-badge" id="fp-badge" style="display:none">0</span></span>
            <button class="fp-clear" onclick="clearArtFilter()">Сбросить</button>
          </div>
          <div class="fp-search">
            <input id="fp-srch" placeholder="Поиск…" oninput="renderFilterList()">
            <span class="fp-ico">🔍</span>
          </div>
          <div class="fp-selall" id="fp-selall" onclick="toggleSelAll()">
            <div class="fp-cb" id="fp-selall-cb"><span class="fp-cb-tick">✓</span></div>
            <span id="fp-selall-lbl">Выбрать все</span>
          </div>
          <div class="fp-list" id="fp-list"></div>
        </div>
        <div class="goods-right"><div id="gtable"></div></div>
      </div>
    </div>
  </div>

  <div class="empty" id="empty-state">
    Загрузите первый отчёт чтобы начать
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script>
// ── Инициализация авторизованного дашборда ──
requireAuth();

const user = getUser();
document.getElementById('nav-username').textContent = user?.username || '—';

if (user?.role === 'admin') {
  document.getElementById('admin-link').style.display = 'block';
  document.getElementById('mgr-select').style.display = 'block';
  document.getElementById('upload-mgr-select').style.display = 'block';
}

let selectedManagerId = user?.role === 'manager' ? user.manager_id : null;
let reportsFromDB = [];

// Загружаем менеджеров в селект
async function loadManagers() {
  try {
    const managers = await API.get('/managers');
    const sel  = document.getElementById('mgr-select');
    const sel2 = document.getElementById('upload-mgr-select');
    managers.forEach(m => {
      sel.innerHTML  += `<option value="${m.id}">${m.name}</option>`;
      sel2.innerHTML += `<option value="${m.id}">${m.name}</option>`;
    });
    // Менеджер — автоматически выбираем себя
    if (user?.role === 'manager' && user.manager_id) {
      sel2.value = user.manager_id;
    }
  } catch(e) { console.error(e); }
}

function onManagerChange() {
  selectedManagerId = document.getElementById('mgr-select').value || null;
  loadReports();
}

// Загружаем отчёты из БД
async function loadReports() {
  try {
    const query  = selectedManagerId ? `?manager_id=${selectedManagerId}` : '';
    reportsFromDB = await API.get(`/reports${query}`);
    renderReportsList();
    buildWeeksFromDB();
  } catch(e) { console.error('Ошибка загрузки отчётов:', e); }
}

function renderReportsList() {
  const el = document.getElementById('reports-list');
  if (!reportsFromDB.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,.08);overflow:hidden">
      <div style="padding:10px 16px;border-bottom:0.5px solid rgba(0,0,0,.06);font-size:12px;font-weight:600;color:#666;display:flex;justify-content:space-between;align-items:center">
        <span>Загруженные отчёты (${reportsFromDB.length})</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr style="background:#f5f4f8">
            <th style="padding:7px 14px;text-align:left;color:#888;font-weight:600">Период</th>
            <th style="padding:7px 14px;text-align:left;color:#888;font-weight:600">Менеджер</th>
            <th style="padding:7px 14px;text-align:left;color:#888;font-weight:600">Файл</th>
            <th style="padding:7px 14px;text-align:left;color:#888;font-weight:600">Загружен</th>
            ${user?.role === 'admin' ? '<th style="padding:7px 14px;text-align:left;color:#888;font-weight:600">Действия</th>' : ''}
          </tr></thead>
          <tbody>
            ${reportsFromDB.map(r => `
              <tr style="border-top:0.5px solid rgba(0,0,0,.05)">
                <td style="padding:8px 14px;font-weight:500">${r.period_start} — ${r.period_end}</td>
                <td style="padding:8px 14px;color:#7C3AED;font-weight:500">${r.manager_name}</td>
                <td style="padding:8px 14px;color:#888">${r.filename || '—'}</td>
                <td style="padding:8px 14px;color:#888">${new Date(r.created_at).toLocaleDateString('ru')}</td>
                ${user?.role === 'admin' ? `<td style="padding:8px 14px"><button onclick="deleteReport('${r.id}')" style="border:none;background:rgba(220,38,38,.1);color:#DC2626;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit">Удалить</button></td>` : ''}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function buildWeeksFromDB() {
  // Конвертируем отчёты из БД в формат S.weeks для существующего дашборда
  if (!reportsFromDB.length) {
    document.getElementById('wbar').style.display        = 'none';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('empty-state').style.display  = 'block';
    return;
  }

  S.weeks = reportsFromDB.map(r => ({
    label: `${r.period_start?.slice(5).replace('-','.')} — ${r.period_end?.slice(5).replace('-','.')}`,
    summary: buildSummaryFromReport(r),
    goods:   r.raw_data?.goods ? { h: Object.keys(r.raw_data.goods[0] || {}), rows: r.raw_data.goods.map(g => Object.values(g)) } : { h:[], rows:[] }
  }));

  S.selW = S.weeks.map(w => w.label);
  rebuildAllArts();

  document.getElementById('wbar').style.display         = 'flex';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('empty-state').style.display  = 'none';

  renderAll();
}

function buildSummaryFromReport(r) {
  return {
    'Показы':                       r.impressions,
    'CTR':                          r.ctr,
    'Переходы в карточку':          r.clicks,
    'Положили в корзину':           r.added_to_cart,
    'Заказали, шт':                 r.ordered_qty,
    'Выкупили, шт':                 r.bought_qty,
    'Отменили, шт':                 r.cancelled_qty,
    'Конверсия в корзину, %':       r.conv_to_cart,
    'Конверсия в заказ, %':         r.conv_to_order,
    'Процент выкупа':               r.buyout_rate,
    'Заказали на сумму, ⃀':        r.revenue,
    'Средняя цена, ⃀':             r.avg_price,
    ...(r.raw_data?.summary || {})
  };
}

async function uploadReport() {
  const input = document.getElementById('upload-input');
  const file  = input.files[0];
  if (!file) return;

  const mgrId = user?.role === 'admin'
    ? document.getElementById('upload-mgr-select').value
    : user.manager_id;

  if (user?.role === 'admin' && !mgrId) {
    document.getElementById('upload-status').textContent  = 'Выберите менеджера';
    document.getElementById('upload-status').className    = 'upload-status err';
    return;
  }

  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = 'Загрузка...'; statusEl.className = 'upload-status';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('manager_id', mgrId);

  try {
    const res = await API.upload('/reports', fd);
    statusEl.textContent = `✓ Загружен: ${res.period_start} — ${res.period_end}`;
    statusEl.className   = 'upload-status ok';
    input.value = '';
    loadReports();
  } catch(e) {
    statusEl.textContent = '✗ ' + e.message;
    statusEl.className   = 'upload-status err';
  }
}

async function deleteReport(id) {
  if (!confirm('Удалить этот отчёт?')) return;
  try {
    await API.delete(`/reports/${id}`);
    loadReports();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// Инициализация
loadManagers();
loadReports();
</script>
</body>
</html>
