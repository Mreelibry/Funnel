<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — WB Аналитика</title>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--wb:#7C3AED;--wb2:rgba(124,58,237,.09);--wb3:rgba(124,58,237,.18);--green:#16A34A;--red:#DC2626;--t:#111;--g:#666;--bg:#f5f4f8;--card:#fff;--b:rgba(0,0,0,.1)}
    html.dark{--wb:#8B5CF6;--wb2:rgba(139,92,246,.1);--wb3:rgba(139,92,246,.2);--green:#22C55E;--red:#EF4444;--t:#F1F0F5;--g:#9CA3AF;--bg:#13111E;--card:#1E1B2E;--b:rgba(255,255,255,.07)}
    html.dark body{background:var(--bg);color:var(--t)}
    html.dark nav,html.dark .table-wrap,html.dark .modal,html.dark .stat{background:var(--card);border-color:var(--b)}
    html.dark thead th{background:#13111E;color:var(--g)}
    html.dark tbody td{border-color:rgba(255,255,255,.05)}
    html.dark .field input,html.dark .field select{background:#282440;border-color:rgba(255,255,255,.15);color:var(--t)}
    html.dark .btn-ghost{background:#282440;color:var(--g);border-color:rgba(255,255,255,.1)}
    body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}

    /* NAV */
    nav{background:#fff;border-bottom:1px solid var(--b);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px}
    .nav-logo{width:28px;height:28px;border-radius:7px;background:var(--wb);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
    .nav-title{font-size:14px;font-weight:700;color:var(--t)}
    .nav-badge{background:var(--wb3);color:var(--wb);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:600}
    .nav-links{display:flex;gap:4px;margin-left:12px}
    .nav-link{padding:5px 12px;border-radius:8px;font-size:13px;color:var(--g);text-decoration:none;transition:background .15s}
    .nav-link:hover,.nav-link.active{background:var(--wb2);color:var(--wb);font-weight:500}
    .nav-user{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--g)}
    .btn-logout{border:none;background:none;cursor:pointer;font-size:13px;color:var(--g);font-family:inherit}
    .btn-logout:hover{color:var(--red)}
    .btn-theme{border:none;background:var(--wb2);border-radius:8px;padding:4px 9px;font-size:14px;color:var(--g);cursor:pointer;transition:color .15s;line-height:1}.btn-theme:hover{color:var(--wb)}
    .rpt-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
    .rpt-ok{background:rgba(22,163,74,.1);color:var(--green)}
    .rpt-warn{background:rgba(220,38,38,.1);color:var(--red)}
    .rpt-none{background:rgba(107,114,128,.12);color:var(--g)}

    /* MAIN */
    main{max-width:1000px;margin:0 auto;padding:24px 20px}
    .page-title{font-size:20px;font-weight:700;margin-bottom:20px}

    /* TABS */
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--b);margin-bottom:20px}
    .tab{padding:8px 16px;font-size:13px;font-family:inherit;border:none;background:none;color:var(--g);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
    .tab.on{color:var(--wb);border-bottom-color:var(--wb);font-weight:600}

    /* CARDS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
    .stat{background:var(--card);border-radius:12px;padding:14px 16px;border:0.5px solid var(--b)}
    .stat-l{font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
    .stat-v{font-size:24px;font-weight:700;color:var(--t)}

    /* TABLE */
    .table-wrap{background:var(--card);border-radius:14px;border:0.5px solid var(--b);overflow:hidden}
    .table-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:0.5px solid var(--b)}
    .table-head-title{font-size:14px;font-weight:600}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{background:var(--bg);padding:9px 14px;text-align:left;font-weight:600;font-size:11px;color:var(--g);text-transform:uppercase;letter-spacing:.04em;border-bottom:0.5px solid var(--b)}
    tbody td{padding:11px 14px;border-bottom:0.5px solid rgba(0,0,0,.05);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:var(--wb2)}

    /* BADGES */
    .role{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600}
    .role.admin{background:var(--wb3);color:var(--wb)}
    .role.manager{background:rgba(22,163,74,.1);color:var(--green)}
    .status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
    .status.on{background:var(--green)}
    .status.off{background:#ccc}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:var(--wb);color:#fff}
    .btn-danger{background:rgba(220,38,38,.1);color:var(--red)}
    .btn-ghost{background:var(--bg);color:var(--g);border:0.5px solid var(--b)}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;display:none}
    .overlay.show{display:flex}
    .modal{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal h2{font-size:18px;font-weight:700;margin-bottom:18px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    .field input,.field select{width:100%;border:1.5px solid #e0dde8;border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--t);background:#fafafa}
    .field input:focus,.field select:focus{outline:none;border-color:var(--wb)}
    .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
    .error-msg{color:var(--red);font-size:12px;margin-top:4px;display:none}
    .error-msg.show{display:block}
    .empty{text-align:center;padding:30px;color:var(--g);font-size:13px}
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">WB</div>
  <div class="nav-title">Аналитика</div>
  <span class="nav-badge">Админ</span>
  <div class="nav-links">
    <a class="nav-link" href="dashboard.html">Дашборд</a>
    <a class="nav-link" href="unit_economics.html">Юнит-экономика</a>
    <a class="nav-link active" href="admin.html">Управление</a>
  </div>
  <div class="nav-user">
    <button class="btn-theme" id="theme-btn" onclick="toggleTheme()"></button>
    <span id="nav-username">—</span>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
</nav>

<main>
  <div class="page-title">Управление пользователями</div>

  <!-- Статистика -->
  <div class="stats">
    <div class="stat"><div class="stat-l">Всего пользователей</div><div class="stat-v" id="stat-total">—</div></div>
    <div class="stat"><div class="stat-l">Менеджеров</div><div class="stat-v" id="stat-managers">—</div></div>
    <div class="stat"><div class="stat-l">Активных</div><div class="stat-v" id="stat-active">—</div></div>
  </div>

  <!-- Таблица пользователей -->
  <div class="table-wrap">
    <div class="table-head">
      <span class="table-head-title">Пользователи</span>
      <button class="btn btn-primary" onclick="openCreateModal()">＋ Добавить</button>
    </div>
    <table>
      <thead><tr>
        <th>Логин</th><th>Роль</th><th>Менеджер</th><th>Статус</th><th>Последний отчёт</th><th>Создан</th><th>Действия</th>
      </tr></thead>
      <tbody id="users-tbody">
        <tr><td colspan="6" class="empty">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modal: создать/редактировать -->
<div class="overlay" id="user-modal">
  <div class="modal">
    <h2 id="modal-title">Новый пользователь</h2>
    <div class="field">
      <label>Логин</label>
      <input type="text" id="f-username" placeholder="username">
      <div class="error-msg" id="e-username"></div>
    </div>
    <div class="field">
      <label id="pw-label">Пароль</label>
      <input type="password" id="f-password" placeholder="минимум 6 символов">
    </div>
    <div class="field">
      <label>Роль</label>
      <select id="f-role">
        <option value="manager">Менеджер</option>
        <option value="admin">Администратор</option>
      </select>
    </div>
    <div class="field" id="mgr-name-field">
      <label>Имя менеджера (отображаемое)</label>
      <input type="text" id="f-manager-name" placeholder="Иван Петров">
    </div>
    <div class="field" id="active-field" style="display:none">
      <label>Статус</label>
      <select id="f-active">
        <option value="true">Активен</option>
        <option value="false">Заблокирован</option>
      </select>
    </div>
    <div class="error-msg show" id="modal-error" style="display:none;margin-bottom:10px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="modal-submit" onclick="submitUser()">Создать</button>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
requireAuth(true);
document.getElementById('nav-username').textContent = getUser()?.username || '—';

// ─── THEME ───
function initTheme() {
  if (localStorage.getItem('wb_theme') === 'dark') document.documentElement.classList.add('dark');
  updateThemeBtn();
}
function toggleTheme() {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('wb_theme', dark ? 'dark' : 'light');
  updateThemeBtn();
}
function updateThemeBtn() {
  const btn = document.getElementById('theme-btn');
  if (!btn) return;
  const dark = document.documentElement.classList.contains('dark');
  btn.textContent = dark ? '◐' : '◑';
  btn.title = dark ? 'Светлая тема' : 'Тёмная тема';
}
initTheme();

let editingId = null;
let usersCache = [];
let reportStatusMap = {};   // managerId  → { date, daysAgo }
let userToManager  = {};    // userId     → managerId

// Переключатель поля "Имя менеджера"
document.getElementById('f-role').addEventListener('change', e => {
  document.getElementById('mgr-name-field').style.display =
    e.target.value === 'manager' ? 'block' : 'none';
});

async function loadReportStatus() {
  try {
    const [managers, reports] = await Promise.all([
      API.get('/managers'),
      API.get('/reports')
    ]);
    userToManager = {};
    managers.forEach(m => { if (m.user_id) userToManager[m.user_id] = m.id; });

    const latestDate = {};
    reports.forEach(r => {
      if (!latestDate[r.manager_id] || r.period_end > latestDate[r.manager_id])
        latestDate[r.manager_id] = r.period_end;
    });

    const today = new Date(); today.setHours(0,0,0,0);
    reportStatusMap = {};
    Object.entries(latestDate).forEach(([mgrId, date]) => {
      const daysAgo = Math.floor((today - new Date(date)) / 86400000);
      reportStatusMap[mgrId] = { date, daysAgo };
    });
  } catch(e) { console.error('Report status error', e); }
}

function reportBadge(userId) {
  if (!userToManager[userId]) return '<span style="color:#aaa;font-size:11px">—</span>';
  const s = reportStatusMap[userToManager[userId]];
  if (!s) return '<span class="rpt-badge rpt-none">Нет отчёта</span>';
  const d = new Date(s.date).toLocaleDateString('ru', {day:'2-digit', month:'2-digit'});
  if (s.daysAgo <= 10) return `<span class="rpt-badge rpt-ok">${d}</span>`;
  return `<span class="rpt-badge rpt-warn">${d} · ${s.daysAgo} дн.</span>`;
}

async function loadUsers() {
  try {
    [usersCache] = await Promise.all([
      API.get('/users').then(d => { usersCache = d; return d; }),
      loadReportStatus()
    ]);
    renderUsers(usersCache);
    document.getElementById('stat-total').textContent    = usersCache.length;
    document.getElementById('stat-managers').textContent = usersCache.filter(u => u.role === 'manager').length;
    document.getElementById('stat-active').textContent   = usersCache.filter(u => u.is_active).length;
  } catch (e) {
    document.getElementById('users-tbody').innerHTML =
      `<tr><td colspan="7" class="empty">Ошибка загрузки: ${e.message}</td></tr>`;
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Нет пользователей</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td><span class="role ${u.role}">${u.role === 'admin' ? 'Администратор' : 'Менеджер'}</span></td>
      <td>${u.manager_name || '—'}</td>
      <td><span class="status ${u.is_active ? 'on' : 'off'}"></span>${u.is_active ? 'Активен' : 'Заблокирован'}</td>
      <td>${u.role === 'manager' ? reportBadge(u.id) : '<span style="color:#aaa;font-size:11px">—</span>'}</td>
      <td style="color:#888;font-size:12px">${new Date(u.created_at).toLocaleDateString('ru')}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost" onclick="openEditModal('${u.id}')">Изменить</button>
        <button class="btn btn-danger" onclick="deleteUser('${u.id}','${u.username}')">Удалить</button>
      </td>
    </tr>
  `).join('');
}

function openCreateModal() {
  editingId = null;
  document.getElementById('modal-title').textContent      = 'Новый пользователь';
  document.getElementById('modal-submit').textContent     = 'Создать';
  document.getElementById('f-username').value             = '';
  document.getElementById('f-password').value             = '';
  document.getElementById('f-role').value                 = 'manager';
  document.getElementById('f-manager-name').value         = '';
  document.getElementById('f-username').disabled          = false;
  document.getElementById('pw-label').textContent         = 'Пароль';
  document.getElementById('active-field').style.display   = 'none';
  document.getElementById('mgr-name-field').style.display = 'block';
  document.getElementById('modal-error').style.display    = 'none';
  document.getElementById('user-modal').classList.add('show');
}

function openEditModal(id) {
  const u = usersCache.find(x => x.id === id);
  if (!u) return;
  editingId = id;
  document.getElementById('modal-title').textContent      = 'Редактировать пользователя';
  document.getElementById('modal-submit').textContent     = 'Сохранить';
  document.getElementById('f-username').value             = u.username;
  document.getElementById('f-username').disabled          = true;
  document.getElementById('f-password').value             = '';
  document.getElementById('f-role').value                 = u.role;
  document.getElementById('f-manager-name').value         = u.manager_name || '';
  document.getElementById('pw-label').textContent         = 'Новый пароль (оставьте пустым чтобы не менять)';
  document.getElementById('active-field').style.display   = 'block';
  document.getElementById('f-active').value               = String(u.is_active);
  document.getElementById('mgr-name-field').style.display = u.role === 'manager' ? 'block' : 'none';
  document.getElementById('modal-error').style.display    = 'none';
  document.getElementById('user-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('user-modal').classList.remove('show');
}

async function submitUser() {
  const errEl = document.getElementById('modal-error');
  errEl.style.display = 'none';

  const body = {
    username:     document.getElementById('f-username').value.trim(),
    password:     document.getElementById('f-password').value,
    role:         document.getElementById('f-role').value,
    manager_name: document.getElementById('f-manager-name').value.trim(),
    is_active:    document.getElementById('f-active').value === 'true',
  };

  try {
    if (editingId) {
      // Редактирование
      const payload = { role: body.role, manager_name: body.manager_name, is_active: body.is_active };
      if (body.password) payload.password = body.password;
      await API.put(`/users/${editingId}`, payload);
    } else {
      // Создание
      if (!body.username) throw new Error('Введите логин');
      if (!body.password) throw new Error('Введите пароль');
      await API.post('/users', body);
    }
    closeModal();
    loadUsers();
  } catch (e) {
    errEl.textContent    = e.message;
    errEl.style.display  = 'block';
  }
}

async function deleteUser(id, username) {
  if (!confirm(`Удалить пользователя "${username}"? Это действие необратимо.`)) return;
  try {
    await API.delete(`/users/${id}`);
    loadUsers();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

// Закрытие по клику вне модала
document.getElementById('user-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

loadUsers();
</script>
</body>
</html>
