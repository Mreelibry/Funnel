name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 138.197.186.124
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /var/www/funnel

            git fetch origin main
            git reset --hard origin/main

            cd /var/www/funnel/backend
            npm install --omit=dev

            pm2 restart funnel-backend

            echo "✅ Deploy done"
